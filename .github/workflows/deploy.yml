name: Build & Deploy to Cloudron Surfer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Remove pre-installed Hugo
        run: |
          which hugo && sudo rm -f $(which hugo) || true

      - name: Install Hugo Extended 0.156.0
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.156.0/hugo_extended_0.156.0_linux-amd64.tar.gz
          tar -xzf hugo_extended_0.156.0_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Install npm dependencies
        run: npm install

      - name: Build Hugo site
        run: hugo --minify

      - name: Install cloudron-surfer
        run: npm install -g cloudron-surfer

      - name: Deploy to Cloudron Surfer
        env:
          SURFER_TOKEN: ${{ secrets.SURFER_TOKEN }}
          SURFER_HOST: ${{ secrets.SURFER_HOST }}
        run: |
          surfer put --token "$SURFER_TOKEN" --server "$SURFER_HOST" public/* /
