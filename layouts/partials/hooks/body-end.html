<style>
  #fsw-widget {
    position: fixed;
    bottom: 24px;
    left: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 9998;
  }
  #fsw-sub-btns {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    pointer-events: none;
  }
  .fsw-sub {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    position: relative;
    transform: scale(0) translateY(20px);
    opacity: 0;
    transition: transform 0.28s cubic-bezier(.34,1.56,.64,1),
                opacity 0.22s ease,
                filter 0.18s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.22);
  }
  .fsw-sub:hover { filter: brightness(1.1); }
  .fsw-sub svg { width: 22px; height: 22px; fill: #fff; }

  #fsw-fb    { background: #1877F2; }
  #fsw-x     { background: #000; }
  #fsw-wa    { background: #25D366; }
  #fsw-li    { background: #0A66C2; }
  #fsw-email { background: #EA4335; }

  .fsw-label {
    position: absolute;
    left: 54px;
    white-space: nowrap;
    font-size: 12px;
    font-weight: 500;
    font-family: system-ui, sans-serif;
    color: #fff;
    background: rgba(0,0,0,0.65);
    padding: 4px 10px;
    border-radius: 20px;
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.18s ease, transform 0.18s ease;
    pointer-events: none;
  }
  .fsw-sub:hover .fsw-label {
    opacity: 1;
    transform: translateX(0);
  }

  #fsw-main {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #555;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
                background 0.2s;
    position: relative;
  }
  #fsw-main:hover { transform: scale(1.08); }
  #fsw-main svg {
    width: 26px;
    height: 26px;
    fill: #fff;
    position: absolute;
    transition: transform 0.3s ease, opacity 0.22s ease;
  }
  .fsw-icon-share { transform: scale(1) rotate(0deg);   opacity: 1; }
  .fsw-icon-close { transform: scale(0) rotate(-90deg); opacity: 0; }

  #fsw-widget.open #fsw-sub-btns  { pointer-events: all; }
  #fsw-widget.open #fsw-fb    { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0.16s; }
  #fsw-widget.open #fsw-x     { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0.12s; }
  #fsw-widget.open #fsw-wa    { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0.08s; }
  #fsw-widget.open #fsw-li    { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0.04s; }
  #fsw-widget.open #fsw-email { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0s; }
  #fsw-widget.open .fsw-icon-share { transform: scale(0) rotate(90deg);  opacity: 0; }
  #fsw-widget.open .fsw-icon-close { transform: scale(1) rotate(0deg);   opacity: 1; }

  @media (max-width: 768px) {
    #fsw-widget { bottom: 16px; left: 16px; }
    .fsw-label  { display: none; }
    .fsw-sub { width: 40px; height: 40px; }
    .fsw-sub svg { width: 18px; height: 18px; }
    #fsw-main { width: 48px; height: 48px; }
    #fsw-main svg { width: 22px; height: 22px; }
  }
</style>

<script>
  (function () {
    var widget = document.getElementById('fsw-widget');
    var btn    = document.getElementById('fsw-main');
    var url    = encodeURIComponent(window.location.href);
    var title  = encodeURIComponent(document.title);

    document.getElementById('fsw-fb').href    = 'https://www.facebook.com/sharer/sharer.php?u=' + url;
    document.getElementById('fsw-x').href     = 'https://twitter.com/intent/tweet?url=' + url + '&text=' + title;
    document.getElementById('fsw-wa').href    = 'https://wa.me/?text=' + title + '%20' + url;
    document.getElementById('fsw-li').href    = 'https://www.linkedin.com/sharing/share-offsite/?url=' + url;
    document.getElementById('fsw-email').href = 'mailto:?subject=' + title + '&body=' + url;

    btn.addEventListener('click', function () {
      var open = widget.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });

    document.addEventListener('click', function (e) {
      if (!widget.contains(e.target)) {
        widget.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>
