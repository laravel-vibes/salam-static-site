<style>
  #fcw-widget {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 9999;
  }

  #fcw-sub-btns {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    pointer-events: none;
  }

  .fcw-sub {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    position: relative;
    transform: scale(0) translateY(20px);
    opacity: 0;
    transition: transform 0.28s cubic-bezier(.34,1.56,.64,1),
                opacity 0.22s ease,
                filter 0.18s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.22);
  }
  .fcw-sub:hover { filter: brightness(1.1); }
  .fcw-sub svg { width: 22px; height: 22px; fill: #fff; }

  #fcw-wa   { background: #25D366; }
  #fcw-msg  { background: #0084FF; }
  #fcw-ig   { background: #E1306C; }
  #fcw-call { background: #1A73E8; }

  .fcw-label {
    position: absolute;
    right: 54px;
    white-space: nowrap;
    font-size: 12px;
    font-weight: 500;
    font-family: system-ui, sans-serif;
    color: #fff;
    background: rgba(0,0,0,0.65);
    padding: 4px 10px;
    border-radius: 20px;
    opacity: 0;
    transform: translateX(8px);
    transition: opacity 0.18s ease, transform 0.18s ease;
    pointer-events: none;
  }
  .fcw-sub:hover .fcw-label {
    opacity: 1;
    transform: translateX(0);
  }

  #fcw-main {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a1a1a;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
                background 0.2s;
    position: relative;
  }
  #fcw-main:hover { transform: scale(1.08); }
  #fcw-main svg {
    width: 26px;
    height: 26px;
    fill: #fff;
    position: absolute;
    transition: transform 0.3s ease, opacity 0.22s ease;
  }
  .fcw-icon-chat  { transform: scale(1) rotate(0deg);   opacity: 1; }
  .fcw-icon-close { transform: scale(0) rotate(-90deg); opacity: 0; }

  /* Open state */
  #fcw-widget.open #fcw-sub-btns  { pointer-events: all; }
  #fcw-widget.open #fcw-wa   { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0.12s; }
  #fcw-widget.open #fcw-msg  { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0.08s; }
  #fcw-widget.open #fcw-ig   { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0.04s; }
  #fcw-widget.open #fcw-call { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0s;    }
  #fcw-widget.open .fcw-icon-chat  { transform: scale(0) rotate(90deg);  opacity: 0; }
  #fcw-widget.open .fcw-icon-close { transform: scale(1) rotate(0deg);   opacity: 1; }

  /* Mobile */
  @media (max-width: 480px) {
    #fcw-widget { bottom: 16px; right: 16px; }
    .fcw-label  { display: none; }
  }
</style>

<script>
  (function () {
    var widget = document.getElementById('fcw-widget');
    var btn    = document.getElementById('fcw-main');

    // Inject links from CHAT_LINKS config
    document.getElementById('fcw-wa').href   = CHAT_LINKS.whatsapp;
    document.getElementById('fcw-msg').href  = CHAT_LINKS.messenger;
    document.getElementById('fcw-ig').href   = CHAT_LINKS.instagram;
    document.getElementById('fcw-call').href = CHAT_LINKS.phone;

    btn.addEventListener('click', function () {
      var open = widget.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });

    // Close when clicking elsewhere
    document.addEventListener('click', function (e) {
      if (!widget.contains(e.target)) {
        widget.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>
