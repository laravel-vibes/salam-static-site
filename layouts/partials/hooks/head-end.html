<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Newsreader:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet">
{{ if eq .Language.Lang "ar" }}
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  [dir="rtl"] body,
  [dir="rtl"] .btn,
  [dir="rtl"] .nav-link,
  [dir="rtl"] .navbar-brand,
  [dir="rtl"] p, [dir="rtl"] li,
  [dir="rtl"] .label-md,
  [dir="rtl"] .form-control,
  [dir="rtl"] input {
    font-family: 'Noto Kufi Arabic', 'Manrope', sans-serif;
  }
  [dir="rtl"] h1, [dir="rtl"] h2, [dir="rtl"] h3,
  [dir="rtl"] h4, [dir="rtl"] h5, [dir="rtl"] h6 {
    font-family: 'Noto Kufi Arabic', 'Newsreader', serif;
    font-weight: 600;
  }
</style>
{{ end }}
